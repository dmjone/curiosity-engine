# cloudbuild.yaml
#
# Triggered automatically by a Cloud Build GitHub trigger on every merge to main.
# Workflow: build Docker image, push two tags (SHA + latest) to Artifact Registry,
# deploy the SHA-tagged image to Cloud Run without overwriting existing service config.
#
# Prerequisites (one-time manual setup):
#   1. Create the Artifact Registry repo:
#        gcloud artifacts repositories create curiosity \
#          --repository-format=docker --location=us-central1
#   2. Connect the GitHub repo to Cloud Build and create a trigger pointed at this file.
#   3. Grant the Cloud Build service account these roles in your project:
#        roles/run.admin, roles/iam.serviceAccountUser, roles/artifactregistry.writer

substitutions:
  _REGION: us-central1
  _AR_REPO: curiosity
  _SERVICE: curiosity-engine

steps:
  # Step 1: build the production image.
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  # Step 2: push both tags to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

  # Step 3: deploy the SHA-tagged image to Cloud Run.
  # --no-traffic is not set, so 100% traffic shifts to the new revision immediately.
  # Existing service config (env vars, SA, concurrency, scaling) is preserved
  # because we omit those flags here.
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    waitFor: [push-sha]
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
