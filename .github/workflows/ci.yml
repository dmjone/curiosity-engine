name: CI

# Runs on every pull request and on pushes to main.
# This pipeline is CI only (vet, build, test, CodeQL). Deployment is a
# deliberate local step (deploy/deploy.sh builds the image with ko), so no
# cloud credentials are needed in GitHub Actions.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # required by CodeQL to upload SARIF results

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    # CodeQL analysis is independent of the build job and can run in parallel.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:go
